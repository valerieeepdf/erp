<p-toast />

<div class="login-container">
  <div class="login-card">

    <div class="login-logo" (click)="onLogoClick()">
      <div class="logo-icon">
        <i class="pi pi-ticket"></i>
      </div>
      <h1 class="logo-text">ERPJir</h1>
    </div>

    <div class="login-header">
      <h2>Bienvenido</h2>
      <p>Inicia sesión para continuar</p>
    </div>

    <div class="login-form">
      <div class="field">
        <label for="username">Usuario o Email</label>
        <input
          pInputText
          id="username"
          [(ngModel)]="username"
          placeholder="Ingresa tu usuario o email"
          class="w-full"
          (keyup.enter)="onLogin()"
        />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <p-password
          id="password"
          [(ngModel)]="password"
          placeholder="Ingresa tu contraseña"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
          (keyup.enter)="onLogin()"
        />
      </div>

      <p-button
        label="Iniciar Sesión"
        icon="pi pi-sign-in"
        styleClass="w-full login-btn"
        [loading]="loading()"
        (onClick)="onLogin()"
      />

      <div class="register-link">
        <span>¿No tienes cuenta? </span>
        <a routerLink="/register">Regístrate aquí</a>
      </div>
    </div>

  </div>
</div>
